<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Pouvithira V — UI/UX Designer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
/* ═══════════ RESET & TOKENS ═══════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:16px;scroll-behavior:smooth;}
:root{
  --w:#F6F5F0;
  --b:#0A0A0A;
  --r:#E5300A;
  --g:#888;
  --br:#E0DDD6;
  --card:#F0EEE8;
}
body{font-family:'DM Sans',sans-serif;background:var(--w);color:var(--b);overflow-x:hidden;cursor:none;-webkit-font-smoothing:antialiased;line-height:1;}
::selection{background:var(--r);color:#fff;}

/* ═══════════ CURSOR ═══════════ */
#C{position:fixed;pointer-events:none;z-index:9999;mix-blend-mode:multiply;}
#Cdot{position:absolute;width:10px;height:10px;background:var(--b);border-radius:50%;transform:translate(-50%,-50%);transition:width .3s,height .3s,background .3s,border-radius .3s;}
#Cring{position:absolute;width:40px;height:40px;border:1.5px solid rgba(0,0,0,.3);border-radius:50%;transform:translate(-50%,-50%);transition:width .5s cubic-bezier(.16,1,.3,1),height .5s cubic-bezier(.16,1,.3,1),background .3s,border-color .3s,border-radius .3s;}
#Clabel{position:absolute;transform:translate(-50%,-50%);font-family:'DM Sans',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#fff;opacity:0;transition:opacity .2s;white-space:nowrap;}
body.cur-hover #Cdot{width:0;height:0;}
body.cur-hover #Cring{width:72px;height:72px;background:var(--r);border-color:var(--r);}
body.cur-view #Cdot{width:0;height:0;}
body.cur-view #Cring{width:80px;height:80px;background:var(--b);border-color:var(--b);}
body.cur-view #Clabel{opacity:1;}

/* ═══════════ LOADER ═══════════ */
#LDR{position:fixed;inset:0;z-index:8000;background:var(--b);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;transition:clip-path .9s cubic-bezier(.77,0,.18,1) .1s;}
#LDR.out{clip-path:inset(100% 0 0 0)!important;}
.ld-letters{display:flex;gap:3px;}
.ld-l{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,7vw,88px);letter-spacing:4px;color:var(--w);opacity:0;transform:translateY(60px);animation:ldSlide .7s cubic-bezier(.16,1,.3,1) forwards;}
.ld-track{width:200px;height:1px;background:rgba(255,255,255,.1);}
.ld-fill{height:100%;background:linear-gradient(90deg,var(--r),#ff6b35);width:0;animation:ldFill 1.5s cubic-bezier(.4,0,.2,1) forwards;}
.ld-role{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.3);opacity:0;animation:fadeUp .5s ease 1.1s forwards;}
@keyframes ldSlide{to{opacity:1;transform:translateY(0);}}
@keyframes ldFill{to{width:100%;}}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}

/* ═══════════ SCROLL PROGRESS ═══════════ */
#SPB{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--r),#ff8c00,var(--r));z-index:7000;width:0;transition:width .1s linear;}

/* ═══════════ NAV ═══════════ */
nav{position:fixed;top:0;left:0;right:0;z-index:600;padding:22px 60px;display:flex;align-items:center;justify-content:space-between;transition:padding .4s,background .4s,backdrop-filter .4s,border-color .4s;border-bottom:1px solid transparent;}
nav.s{padding:14px 60px;background:rgba(246,245,240,.92);backdrop-filter:blur(20px);border-bottom-color:var(--br);}
.nlogo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--b);text-decoration:none;position:relative;overflow:hidden;}
.nlogo::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--r);transition:width .35s cubic-bezier(.16,1,.3,1);}
.nlogo:hover::after{width:100%;}
.nlogo em{font-style:normal;color:var(--r);}
.nlinks{display:flex;gap:28px;list-style:none;align-items:center;}
.nlinks a{font-size:12px;font-weight:500;color:var(--g);text-decoration:none;letter-spacing:.5px;position:relative;transition:color .2s;}
.nlinks a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:var(--b);transition:width .3s;}
.nlinks a:hover{color:var(--b);}
.nlinks a:hover::after{width:100%;}
.nclock{font-size:11px;color:var(--g);letter-spacing:.5px;font-variant-numeric:tabular-nums;min-width:72px;text-align:right;}
.nhire{display:inline-flex;align-items:center;gap:7px;background:var(--b);color:var(--w);padding:11px 24px;border-radius:100px;font-size:12px;font-weight:600;text-decoration:none;position:relative;overflow:hidden;transition:transform .25s,box-shadow .25s;}
.nfire-bg{position:absolute;inset:0;background:var(--r);transform:scaleX(0);transform-origin:left;transition:transform .4s cubic-bezier(.16,1,.3,1);border-radius:100px;}
.nfire-txt{position:relative;z-index:1;display:flex;align-items:center;gap:7px;transition:transform .3s;}
.nire-arr{display:inline-block;transition:transform .3s;}
.nire:hover .nire-arr{transform:translateX(4px);}
.nire:hover .nfire-bg{transform:scaleX(1);}
.nire:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(229,48,10,.3);}

/* ═══════════ HERO ═══════════ */
#hero{min-height:100svh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 60px 60px;position:relative;overflow:hidden;border-bottom:1px solid var(--br);}

/* Grain overlay */
#hero::after{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");background-size:200px;pointer-events:none;z-index:0;}

/* Animated bg grid */
.hgrid{position:absolute;inset:0;pointer-events:none;z-index:0;}
.hgv{position:absolute;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,var(--br),transparent);opacity:.6;animation:gridPulse ease-in-out infinite alternate;}
.hgh{position:absolute;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(--br),transparent);opacity:.5;animation:gridPulse ease-in-out infinite alternate;}
@keyframes gridPulse{0%{opacity:.2;}100%{opacity:.7;}}

/* Floating orbs */
.horb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;animation:orbFloat ease-in-out infinite alternate;}
.ho1{width:600px;height:600px;background:radial-gradient(circle,rgba(229,48,10,.07),transparent);top:-150px;right:-100px;animation-duration:16s;}
.ho2{width:400px;height:400px;background:radial-gradient(circle,rgba(0,0,0,.05),transparent);bottom:50px;left:80px;animation-duration:20s;animation-delay:-8s;}
.ho3{width:250px;height:250px;background:radial-gradient(circle,rgba(229,48,10,.04),transparent);top:40%;right:20%;animation-duration:12s;animation-delay:-4s;}
@keyframes orbFloat{0%{transform:translate(0,0) scale(1);}100%{transform:translate(24px,36px) scale(1.08);}}

/* Floating shapes */
.hsh{position:absolute;pointer-events:none;}
.hs1{width:200px;height:200px;border:1px solid rgba(0,0,0,.05);border-radius:50%;top:18%;right:10%;animation:shFloat 8s ease-in-out infinite alternate;}
.hs2{width:80px;height:80px;background:var(--r);opacity:.07;border-radius:50%;top:60%;right:22%;animation:shFloat 6s ease-in-out infinite alternate;animation-delay:-2s;}
.hs3{width:120px;height:120px;border:1px solid rgba(229,48,10,.1);border-radius:50%;bottom:22%;right:6%;animation:shFloat 10s ease-in-out infinite alternate;animation-delay:-5s;}
.hs4{width:3px;height:100px;background:linear-gradient(to bottom,var(--r),transparent);top:28%;right:32%;animation:shFloat 7s ease-in-out infinite alternate;animation-delay:-1s;}
.hs5{width:40px;height:40px;border:1px solid rgba(0,0,0,.07);top:72%;left:60%;animation:shFloat 9s ease-in-out infinite alternate;animation-delay:-3s;}
@keyframes shFloat{0%{transform:translate(0,0) rotate(0deg);}100%{transform:translate(12px,20px) rotate(10deg);}}

/* Parallax bg word */
.hbgw{position:absolute;font-family:'Bebas Neue',sans-serif;font-size:clamp(200px,28vw,380px);letter-spacing:-12px;color:rgba(0,0,0,.025);top:50%;left:50%;transform:translate(-50%,-50%);white-space:nowrap;pointer-events:none;user-select:none;will-change:transform;z-index:0;}

/* Hero content */
.hcontent{position:relative;z-index:1;}
.hpill{display:inline-flex;align-items:center;gap:9px;font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--g);margin-bottom:22px;opacity:0;transform:translateY(20px);animation:fadeUp .7s ease 2.2s forwards;}
.hpdot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:ping 2s ease infinite;}
@keyframes ping{0%{box-shadow:0 0 0 0 rgba(34,197,94,.5);}70%{box-shadow:0 0 0 12px rgba(34,197,94,0);}100%{box-shadow:0 0 0 0 rgba(34,197,94,0);}}

/* Giant name */
.hname{font-family:'Bebas Neue',sans-serif;font-size:clamp(72px,13vw,175px);line-height:.88;letter-spacing:2px;color:var(--b);overflow:hidden;}
.hname-out{font-family:'Bebas Neue',sans-serif;font-size:clamp(72px,13vw,175px);line-height:.88;letter-spacing:2px;color:transparent;-webkit-text-stroke:1.5px rgba(0,0,0,.14);}
.hline{overflow:hidden;display:block;}
.hline-inner{display:block;transform:translateY(110%);animation:lineUp 1s cubic-bezier(.16,1,.3,1) forwards;}
.hname .hline .hline-inner{animation-delay:2s;}
.hname-out .hline .hline-inner{animation-delay:2.1s;}
@keyframes lineUp{to{transform:translateY(0);}}

/* Hero bottom */
.hfoot{display:grid;grid-template-columns:1fr auto 1fr;align-items:end;border-top:1px solid var(--br);padding-top:26px;margin-top:44px;opacity:0;transform:translateY(20px);animation:fadeUp .7s ease 2.4s forwards;}
.hdesc{font-size:14px;color:var(--g);line-height:1.75;font-weight:300;max-width:280px;}
.hrole{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:4px;color:var(--b);}
.hbtns{display:flex;gap:10px;justify-content:flex-end;}

/* Scroll indicator */
.hscroll{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:7px;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--g);opacity:0;animation:fadeUp .5s ease 2.8s forwards;z-index:1;}
.hst{width:1px;height:44px;background:var(--br);position:relative;overflow:hidden;}
.hsd{position:absolute;top:-5px;left:0;width:1px;height:5px;background:var(--r);animation:scrollDrop 1.8s ease-in-out infinite;}
@keyframes scrollDrop{0%{top:-5px;opacity:1;}100%{top:44px;opacity:0;}}

/* ═══════════ BUTTONS ═══════════ */
.btn{display:inline-flex;align-items:center;gap:7px;padding:13px 28px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;text-decoration:none;position:relative;overflow:hidden;transition:transform .3s,box-shadow .3s;}
.btn-bg{position:absolute;inset:0;transform:scaleX(0);transform-origin:left;transition:transform .45s cubic-bezier(.16,1,.3,1);border-radius:100px;}
.btn-t{position:relative;z-index:1;display:flex;align-items:center;gap:7px;}
.btn:hover{transform:translateY(-2px);}
.bdk{background:var(--b);color:var(--w);}
.bdk .btn-bg{background:var(--r);}
.bdk:hover .btn-bg{transform:scaleX(1);}
.bdk:hover{box-shadow:0 8px 30px rgba(229,48,10,.3);}
.bgh{background:transparent;color:var(--b);border:1.5px solid var(--br);}
.bgh .btn-bg{background:var(--b);}
.bgh:hover .btn-bg{transform:scaleX(1);}
.bgh:hover{color:var(--w);border-color:var(--b);}
.brd{background:var(--r);color:#fff;}
.brd .btn-bg{background:var(--b);}
.brd:hover .btn-bg{transform:scaleX(1);}
.brd:hover{box-shadow:0 8px 30px rgba(0,0,0,.25);}
.btn-arr{display:inline-block;transition:transform .3s;}
.btn:hover .btn-arr{transform:translateX(5px);}

/* ═══════════ MARQUEE ═══════════ */
.mwrap{overflow:hidden;padding:14px 0;background:#ECEAE4;border-bottom:1px solid var(--br);position:relative;}
.mwrap::before,.mwrap::after{content:'';position:absolute;top:0;bottom:0;width:100px;z-index:1;pointer-events:none;}
.mwrap::before{left:0;background:linear-gradient(90deg,#ECEAE4,transparent);}
.mwrap::after{right:0;background:linear-gradient(-90deg,#ECEAE4,transparent);}
.mtrack{display:flex;white-space:nowrap;animation:mq 26s linear infinite;}
.mwrap:hover .mtrack{animation-play-state:paused;}
.mi{display:inline-flex;align-items:center;gap:14px;padding:0 22px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--g);transition:color .2s;}
.mi:hover{color:var(--b);}
.ms{color:var(--r);}
@keyframes mq{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}

/* ═══════════ SECTION SYSTEM ═══════════ */
.sec{padding:110px 60px;border-bottom:1px solid var(--br);position:relative;overflow:hidden;}
.swm{position:absolute;right:50px;font-family:'Bebas Neue',sans-serif;font-size:clamp(120px,16vw,200px);color:rgba(0,0,0,.025);letter-spacing:-5px;pointer-events:none;user-select:none;line-height:1;}
.slbl{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--r);display:block;margin-bottom:14px;}
.sdivider{height:1px;background:linear-gradient(90deg,var(--r),var(--b) 40%,transparent);width:0;transition:width 1.4s cubic-bezier(.16,1,.3,1);margin-bottom:56px;}
.sdivider.in{width:100%;}

/* Big headings */
.bh{font-family:'Bebas Neue',sans-serif;line-height:.9;letter-spacing:-2px;color:var(--b);overflow:hidden;margin-bottom:56px;}
.bh .wrd{display:inline-block;transform:translateY(110%);transition:transform .85s cubic-bezier(.16,1,.3,1);}
.bh .wrd:nth-child(2){transition-delay:.1s;}
.bh .wrd:nth-child(3){transition-delay:.2s;}
.bh.in .wrd{transform:translateY(0);}
.bh-lg{font-size:clamp(80px,14vw,190px);}
.bh-md{font-size:clamp(52px,7vw,88px);}

/* ═══════════ ABOUT ═══════════ */
.abgw{position:absolute;top:40px;left:40px;font-family:'Bebas Neue',sans-serif;font-size:clamp(100px,16vw,220px);color:rgba(0,0,0,.025);letter-spacing:-5px;pointer-events:none;user-select:none;line-height:1;white-space:nowrap;z-index:0;}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start;position:relative;z-index:1;}
.ahead em{font-style:normal;color:transparent;-webkit-text-stroke:1.5px var(--b);}
.abody{font-size:15px;line-height:1.9;color:#555;font-weight:300;margin-bottom:32px;}
.abody strong{color:var(--b);font-weight:600;}
.sklbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--g);border-bottom:1px solid var(--br);padding-bottom:8px;margin-bottom:12px;}
.skrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px;}
.sk{font-size:12px;font-weight:500;padding:6px 14px;border-radius:100px;border:1.5px solid var(--br);color:var(--b);position:relative;overflow:hidden;cursor:default;transition:border-color .25s,color .25s;}
.sk-fill{position:absolute;inset:0;background:var(--b);transform:scaleX(0);transform-origin:left;transition:transform .35s cubic-bezier(.16,1,.3,1);border-radius:100px;}
.sk:hover .sk-fill{transform:scaleX(1);}
.sk:hover{color:var(--w);border-color:var(--b);}
.sk span{position:relative;z-index:1;}
.skt{border-color:rgba(229,48,10,.25);color:var(--r);}
.skt .sk-fill{background:var(--r);}
.skt:hover{color:#fff;border-color:var(--r);}
.acards{display:flex;flex-direction:column;gap:14px;}
.acard{background:var(--w);border:1px solid var(--br);border-radius:20px;padding:28px;position:relative;overflow:hidden;transition:transform .45s cubic-bezier(.16,1,.3,1),box-shadow .45s,border-color .3s;}
.acard-line{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--r),transparent);transform:scaleX(0);transform-origin:left;transition:transform .45s cubic-bezier(.16,1,.3,1);}
.acard:hover{transform:translateY(-8px);box-shadow:0 20px 50px rgba(0,0,0,.08);border-color:rgba(0,0,0,.15);}
.acard:hover .acard-line{transform:scaleX(1);}
.acn{font-family:'Bebas Neue',sans-serif;font-size:54px;letter-spacing:-1px;line-height:1;color:var(--b);margin-bottom:4px;}
.acn sup{font-size:28px;color:var(--r);vertical-align:super;}
.acl{font-size:12px;color:var(--g);}
.avcard{background:var(--b);border-radius:20px;padding:28px;position:relative;overflow:hidden;}
.avcard::before,.avcard::after{content:'';position:absolute;border-radius:50%;filter:blur(50px);}
.avcard::before{width:180px;height:180px;background:var(--r);top:-60px;right:-60px;opacity:.12;animation:orbFloat 7s ease-in-out infinite alternate;}
.avcard::after{width:120px;height:120px;background:var(--r);bottom:-30px;left:-30px;opacity:.06;animation:orbFloat 10s ease-in-out infinite alternate-reverse;}
.avring{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:ping 2s infinite;display:inline-block;margin-right:8px;vertical-align:middle;}
.avtag{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#22c55e;vertical-align:middle;}
.avtit{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:#fff;margin:12px 0 6px;}
.avsub{font-size:12px;color:rgba(255,255,255,.4);line-height:1.6;}

/* ═══════════ PROJECTS ═══════════ */
.plist{border-top:1px solid var(--br);}
.pitem{border-bottom:1px solid var(--br);position:relative;overflow:hidden;}
/* Full-row hover fill */
.pitem-fill{position:absolute;inset:0;background:var(--b);transform:scaleX(0);transform-origin:left;transition:transform .55s cubic-bezier(.16,1,.3,1);z-index:0;}
.pitem:hover .pitem-fill{transform:scaleX(1);}
.pitem.open .pitem-fill{transform:scaleX(0);}
.pitem.open{background:var(--card);}
.pitem:hover .ptit,.pitem:hover .pnum{color:var(--w);}
.pitem:hover .pnum{color:rgba(255,255,255,.5);}
.pitem:hover .chip{color:rgba(255,255,255,.4);border-color:rgba(255,255,255,.1);}
.pitem:hover .parr{color:var(--r);transform:translate(5px,-5px);}
.pitem.open:hover .ptit{color:var(--b);}

.phead{display:grid;grid-template-columns:56px 1fr 44px;gap:24px;align-items:center;padding:30px 0;cursor:pointer;position:relative;z-index:1;}
.phead>*{transition:color .4s;}
.pnum{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--r);transition:color .4s;}
.ptit{font-family:'Bebas Neue',sans-serif;font-size:clamp(18px,2.6vw,34px);letter-spacing:.3px;line-height:1.05;color:var(--b);margin-bottom:7px;transition:color .4s;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.chip{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--g);padding:3px 10px;border:1px solid var(--br);border-radius:100px;transition:color .4s,border-color .4s;}
.parr{font-size:20px;color:var(--g);transition:transform .35s cubic-bezier(.16,1,.3,1),color .4s;flex-shrink:0;}
.pitem.open .parr{transform:rotate(45deg);color:var(--r);}

/* Expand panel */
.pexp{display:grid;grid-template-rows:0fr;transition:grid-template-rows .55s cubic-bezier(.16,1,.3,1);}
.pitem.open .pexp{grid-template-rows:1fr;}
.pexp-i{overflow:hidden;}
.pexp-body{display:grid;grid-template-columns:1fr 1fr;gap:44px;padding:4px 0 40px 80px;border-top:1px solid var(--br);}
.db{margin-bottom:15px;}
.dh{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--b);margin-bottom:5px;}
.dp{font-size:13.5px;color:#666;line-height:1.78;font-weight:300;}
.pscr{display:flex;gap:8px;margin-top:6px;}
.pscr img{width:calc(33.33% - 6px);border-radius:12px;border:1px solid var(--br);filter:grayscale(15%);transition:filter .35s,transform .4s cubic-bezier(.16,1,.3,1),box-shadow .4s;}
.pscr img:hover{filter:none;transform:scale(1.07) translateY(-6px);box-shadow:0 16px 40px rgba(0,0,0,.15);}
.plks{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;}
.plk{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;text-decoration:none;padding:9px 18px;border-radius:100px;border:1.5px solid var(--br);color:var(--b);position:relative;overflow:hidden;transition:border-color .25s;}
.plk-fill{position:absolute;
