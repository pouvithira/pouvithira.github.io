<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Pouvithira V | UI/UX Designer</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:'Segoe UI',sans-serif;
      background:#020617;
      color:#e2e8f0;
      overflow-x:hidden;
    }

    /* BACKGROUND GLOW */

    .blur1,
    .blur2{
      position:fixed;
      width:300px;
      height:300px;
      border-radius:50%;
      filter:blur(120px);
      z-index:-1;
    }

    .blur1{
      background:#0ea5e9;
      top:-100px;
      left:-100px;
    }

    .blur2{
      background:#7c3aed;
      bottom:-100px;
      right:-100px;
    }

    /* NAVBAR */

    .navbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px
